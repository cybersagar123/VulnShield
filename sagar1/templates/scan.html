<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Scanner</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #020617, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 40px;
    width: 420px;
    text-align: center;
    box-shadow: 0 0 60px rgba(0,255,255,0.2);
    border: 1px solid rgba(0,255,255,0.3);
}

h1 {
    color: #00ffff;
    margin-bottom: 25px;
    letter-spacing: 2px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.05);
    color: white;
    margin-bottom: 20px;
}

button {
    padding: 12px 30px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, cyan, #007cf0);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px cyan;
}

.glow {
    position: absolute;
    width: 300px;
    height: 300px;
    background: cyan;
    filter: blur(120px);
    opacity: 0.2;
    z-index: -1;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
    <h1>⚡ CYBER SCANNER</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="url" placeholder="https://target.com" required>
        <button type="submit">Scan Now</button>
    </form>
</div>

</body>
</html>
