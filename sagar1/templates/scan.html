<!DOCTYPE html>
<html>
<head>
    <title>Web Application Vulnerability Scanner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 32px;
            font-weight: 700;
        }

        input[type="text"] {
            width: 45%;
            padding: 14px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            margin-top: 25px;
            padding: 12px 40px;
            font-size: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056d6;
        }

    </style>
</head>

<body>

    <h1>WEB APPLICATION VULNERABILITY SCANNER</h1>

    <form method="POST">
        {% csrf_token %}

        <p style="margin-top: 30px;">
            <input type="text" name="url" placeholder="https://example.com" required>
        </p>

        <button type="submit">Scan</button>
    </form>

</body>
</html>
