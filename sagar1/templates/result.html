<!DOCTYPE html>
<html>
<head>
<title>Scan Result</title>

<style>
body {
    background: black;
    color: #00ff9f;
    font-family: monospace;
    padding: 20px;
}

.container {
    border: 1px solid #00ff9f;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 20px #00ff9f;
}

h2 {
    color: cyan;
}

.result {
    margin-top: 20px;
    line-height: 1.8;
}

span {
    color: yellow;
}
</style>
</head>

<body>

<div class="container">
    <h2>🔍 Scanning Target: <span>{{ url }}</span></h2>

    <div class="result">
        <p>💉 SQL Injection: {{ sql }}</p>
        <p>⚡ XSS Attack: {{ xss }}</p>
    </div>
</div>

</body>
</html>
